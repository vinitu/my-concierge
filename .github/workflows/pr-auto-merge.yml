name: CI · PR Validate · Auto-merge

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-auto-merge-my-concierge
  cancel-in-progress: true

jobs:
  validate:
    name: Validate gateway-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit and e2e tests
        run: npm run test:all

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build assistant-api, assistant-worker, and gateway-web images
        run: docker compose build assistant-api assistant-worker gateway-web

  determine_version:
    name: Detect version bump
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft == false }}
    uses: vinitu/github-workflows/.github/workflows/workflow-determine-version-bump.yml@v0.1.8
    with:
      target-branch: main
      major-branch-prefixes: |
        major/
      minor-branch-prefixes: |
        feature/
        features/
      patch-branch-prefixes: |
        fix/
        fixes/
      default: patch
      pull-requests: ${{ toJson(github.event.pull_request) }}
    secrets:
      gh_token: ${{ secrets.TOKEN }}

  merge_prs:
    name: Auto-merge PRs
    needs:
      - validate
      - determine_version
    if: ${{ needs.determine_version.result == 'success' && needs.determine_version.outputs.matching_pr == 'true' && needs.validate.result == 'success' }}
    uses: vinitu/github-workflows/.github/workflows/workflow-merge-pull-requests.yml@v0.1.8
    with:
      target-branch: main
      merge-method: squash
      pull-requests: ${{ toJson(github.event.pull_request) }}
    secrets:
      gh_token: ${{ secrets.TOKEN }}
