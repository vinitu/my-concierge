name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  gateway-web:
    name: gateway-web checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit and e2e tests
        run: npm run test:all

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build assistant-api, assistant-worker, and gateway-web images
        run: docker compose build assistant-api assistant-worker gateway-web
