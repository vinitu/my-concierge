<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyConcierge Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="chat-body">
    <main class="chat-layout container-fluid py-3">
      <div class="chat-shell">
        <div class="status-cluster mb-3">
          <span class="status-pill status-name-pill">
            <span class="status-caption">user</span>
            <span id="user-id-label">unknown</span>
          </span>
          <span class="status-pill status-name-pill">
            <span class="status-caption">conversation</span>
            <span id="conversation-id-label">unknown</span>
          </span>
          <button id="clear-conversation-button" class="status-pill status-action-button" type="button">
            Clear conversation
          </button>
          <span id="connection-status" class="status-pill">
            <span class="status-dot"></span>
            <span id="connection-status-label">connecting</span>
          </span>
        </div>

        <section
          id="messages"
          class="messages"
          aria-live="polite"
        ></section>

        <form id="chat-form" class="chat-form mt-3">
          <div class="chat-form-panel">
            <div class="composer-shell">
              <textarea
                id="message-input"
                name="message"
                class="form-control chat-input"
                placeholder="Send a message to the assistant"
                rows="1"
                required
              ></textarea>
              <button type="submit" class="btn chat-submit-btn">Send</button>
            </div>
          </div>
        </form>
      </div>
    </main>

    <!-- GATEWAY_BOOTSTRAP -->
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
